worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 3000;

        # Backend WebSocket (Reflex state engine)
        location /_event {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # File upload endpoint
        location /_upload {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            client_max_body_size 100M;
        }

        # Backend ping
        location /ping {
            proxy_pass http://127.0.0.1:8000;
        }

        # Frontend (Next.js on 3001) — retorna 200 durante startup para o healthcheck passar
        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            error_page 502 503 504 = @starting;
        }

        location @starting {
            default_type text/html;
            return 200 "<html><body><h2>Iniciando aplicação...</h2></body></html>";
        }
    }
}
